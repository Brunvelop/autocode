<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Graph - Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .component-stage {
            min-height: 200px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }
        architecture-graph {
            display: block;
            width: 600px;
            height: 400px;
        }
    </style>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-2">🔗 Architecture Graph — Tests</h1>
        <p class="text-gray-500 text-sm mb-4">TDD tests for Commit 5: dependency graph with D3 force</p>

        <!-- Server status -->
        <div id="serverStatus" class="mb-6 p-4 bg-gray-100 border border-gray-300 rounded-lg">
            ⏳ No server needed (component-level tests with mocked data)
        </div>

        <!-- Summary -->
        <div id="summary" class="mb-6 p-4 bg-white border border-gray-200 rounded-lg shadow-sm"></div>

        <!-- Test results -->
        <div id="results" class="space-y-4"></div>
    </div>

    <script type="module">
        import '../../utils/test-runner.js';
        import { TestRunner } from '../../utils/test-runner.js';

        const runner = new TestRunner();

        // ====================================================================
        // MOCK DATA
        // ====================================================================

        const MOCK_NODES = [
            {
                id: 'src/app.py', parent_id: 'src', name: 'app.py', type: 'file',
                path: 'src/app.py', loc: 300, sloc: 250, mi: 55.0,
                avg_complexity: 5.5, max_complexity: 15, functions_count: 12,
                classes_count: 3, children_count: 0,
            },
            {
                id: 'src/utils.py', parent_id: 'src', name: 'utils.py', type: 'file',
                path: 'src/utils.py', loc: 200, sloc: 150, mi: 82.0,
                avg_complexity: 2.0, max_complexity: 6, functions_count: 6,
                classes_count: 1, children_count: 0,
            },
            {
                id: 'src/models.py', parent_id: 'src', name: 'models.py', type: 'file',
                path: 'src/models.py', loc: 180, sloc: 130, mi: 75.0,
                avg_complexity: 3.0, max_complexity: 8, functions_count: 4,
                classes_count: 5, children_count: 0,
            },
            {
                id: 'src/api.py', parent_id: 'src', name: 'api.py', type: 'file',
                path: 'src/api.py', loc: 120, sloc: 90, mi: 68.0,
                avg_complexity: 4.0, max_complexity: 10, functions_count: 8,
                classes_count: 0, children_count: 0,
            },
            {
                id: 'tests/test_app.py', parent_id: 'tests', name: 'test_app.py', type: 'file',
                path: 'tests/test_app.py', loc: 150, sloc: 100, mi: 85.0,
                avg_complexity: 1.5, max_complexity: 3, functions_count: 5,
                classes_count: 1, children_count: 0,
            },
            {
                id: 'src/bad_module.py', parent_id: 'src', name: 'bad_module.py', type: 'file',
                path: 'src/bad_module.py', loc: 400, sloc: 320, mi: 18.0,
                avg_complexity: 14.0, max_complexity: 28, functions_count: 10,
                classes_count: 2, children_count: 0,
            },
        ];

        const MOCK_DEPENDENCIES = [
            { source: 'src/app.py', target: 'src/utils.py', import_names: ['helper', 'format_date'] },
            { source: 'src/app.py', target: 'src/models.py', import_names: ['User', 'Session'] },
            { source: 'src/api.py', target: 'src/app.py', import_names: ['create_app'] },
            { source: 'src/api.py', target: 'src/models.py', import_names: ['User'] },
            { source: 'tests/test_app.py', target: 'src/app.py', import_names: ['create_app'] },
            // Circular: app → bad_module and bad_module → app
            { source: 'src/app.py', target: 'src/bad_module.py', import_names: ['legacy_func'] },
            { source: 'src/bad_module.py', target: 'src/app.py', import_names: ['get_config'] },
        ];

        const MOCK_CIRCULAR = [
            ['src/app.py', 'src/bad_module.py'],
        ];

        // Import the component
        await import('../../../elements/architecture/architecture-graph.js');

        // Helper: create graph with given data
        function createGraph(nodes = MOCK_NODES, deps = MOCK_DEPENDENCIES, circular = MOCK_CIRCULAR) {
            const el = document.createElement('architecture-graph');
            el.nodes = nodes;
            el.dependencies = deps;
            el.circularDependencies = circular;
            return el;
        }

        // Helper: wait for D3 rendering (requestAnimationFrame + updateComplete + simulation settle)
        async function waitForRender(el, timeout = 2500) {
            await el.updateComplete;
            // Give D3 force simulation time to initialize and render first frame
            await new Promise(r => requestAnimationFrame(() => setTimeout(r, 150)));
            await el.updateComplete;
        }

        // ====================================================================
        // A) COMPONENT REGISTRATION
        // ====================================================================

        runner.group('A) Registro del componente', () => {

            runner.test('architecture-graph se define como custom element', async (stage) => {
                runner.assertTrue(
                    customElements.get('architecture-graph'),
                    'architecture-graph debería estar registrado'
                );
            });

            runner.test('Instanciar architecture-graph crea un elemento válido', async (stage) => {
                const el = createGraph();
                runner.assertTrue(el instanceof HTMLElement, 'Debería ser HTMLElement');
                runner.assertEqual(el.tagName.toLowerCase(), 'architecture-graph');
            });

        });

        // ====================================================================
        // B) SVG RENDERING
        // ====================================================================

        runner.group('B) Renderizado SVG', () => {

            runner.test('Renderiza un elemento SVG dentro del shadow DOM', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const svg = el.shadowRoot.querySelector('svg');
                runner.assertTrue(svg !== null, 'Debería existir un SVG');
            });

            runner.test('SVG contiene circles (nodos del grafo)', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const circles = el.shadowRoot.querySelectorAll('circle');
                runner.assertTrue(circles.length > 0, 'Debería haber circles en el SVG');
            });

            runner.test('Número de nodos = archivos pasados (modo file)', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');
                runner.assertEqual(
                    nodeGroups.length, MOCK_NODES.length,
                    `Debería haber ${MOCK_NODES.length} nodos, got ${nodeGroups.length}`
                );
            });

            runner.test('SVG contiene lines/paths (links del grafo)', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const links = el.shadowRoot.querySelectorAll('.graph-link');
                runner.assertTrue(links.length > 0, 'Debería haber links en el SVG');
            });

            runner.test('Número de links = dependencias pasadas', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const links = el.shadowRoot.querySelectorAll('.graph-link');
                runner.assertEqual(
                    links.length, MOCK_DEPENDENCIES.length,
                    `Debería haber ${MOCK_DEPENDENCIES.length} links, got ${links.length}`
                );
            });

            runner.test('SVG tiene arrow marker-def para flechas', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const marker = el.shadowRoot.querySelector('marker');
                runner.assertTrue(marker !== null, 'Debería haber un marker SVG para flechas');
            });

        });

        // ====================================================================
        // C) COLOR SCALE (MI → color)
        // ====================================================================

        runner.group('C) Escala de color por MI', () => {

            runner.test('Nodos tienen fill color (no transparent ni none)', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const circles = el.shadowRoot.querySelectorAll('.graph-node circle');
                runner.assertTrue(circles.length > 0, 'Debería haber circles');

                for (const circle of circles) {
                    const fill = circle.getAttribute('fill') || '';
                    runner.assertTrue(
                        fill !== '' && fill !== 'none' && fill !== 'transparent',
                        `Circle debería tener fill color, got: "${fill}"`
                    );
                }
            });

            runner.test('_miColor existe como función', async (stage) => {
                const el = createGraph();
                runner.assertTrue(
                    typeof el._miColor === 'function',
                    '_miColor debería ser una función'
                );
            });

            runner.test('MI alto produce color diferente a MI bajo', async (stage) => {
                const el = createGraph();
                const greenColor = el._miColor(90);
                const redColor = el._miColor(10);
                runner.assertTrue(
                    greenColor !== redColor,
                    `MI=90 (${greenColor}) y MI=10 (${redColor}) deberían ser diferentes`
                );
            });

        });

        // ====================================================================
        // D) NODE SIZE (radio ∝ sqrt(SLOC))
        // ====================================================================

        runner.group('D) Tamaño de nodos proporcional a SLOC', () => {

            runner.test('Nodos tienen atributo r (radio) > 0', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const circles = el.shadowRoot.querySelectorAll('.graph-node circle');
                runner.assertTrue(circles.length > 0, 'Debería haber circles');

                for (const circle of circles) {
                    const r = parseFloat(circle.getAttribute('r') || 0);
                    runner.assertTrue(r > 0, `Radio debería ser > 0, got ${r}`);
                }
            });

            runner.test('Archivo con más SLOC tiene radio mayor', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');
                const radii = {};

                for (const g of nodeGroups) {
                    const id = g.dataset.id;
                    const circle = g.querySelector('circle');
                    if (id && circle) {
                        radii[id] = parseFloat(circle.getAttribute('r') || 0);
                    }
                }

                // bad_module.py has sloc=320, utils.py has sloc=150
                if (radii['src/bad_module.py'] && radii['src/utils.py']) {
                    runner.assertTrue(
                        radii['src/bad_module.py'] > radii['src/utils.py'],
                        `bad_module (sloc=320, r=${radii['src/bad_module.py']}) debería ser mayor que utils (sloc=150, r=${radii['src/utils.py']})`
                    );
                }
            });

        });

        // ====================================================================
        // E) CIRCULAR DEPENDENCIES
        // ====================================================================

        runner.group('E) Dependencias circulares', () => {

            runner.test('Links circulares tienen clase .circular', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const circularLinks = el.shadowRoot.querySelectorAll('.graph-link.circular');
                runner.assertTrue(
                    circularLinks.length > 0,
                    'Debería haber al menos un link con clase .circular'
                );
            });

            runner.test('Links circulares son visualmente distintos (stroke-dasharray o color rojo)', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const circularLinks = el.shadowRoot.querySelectorAll('.graph-link.circular');
                runner.assertTrue(circularLinks.length > 0, 'Debería haber links circulares');

                for (const link of circularLinks) {
                    const dashArray = link.getAttribute('stroke-dasharray') || '';
                    const stroke = link.getAttribute('stroke') || '';
                    const hasVisualDistinction = dashArray !== '' || stroke.includes('dc2626') || stroke.includes('red') || stroke.includes('ef4444');
                    runner.assertTrue(
                        hasVisualDistinction,
                        `Link circular debería ser punteado o rojo. dasharray="${dashArray}", stroke="${stroke}"`
                    );
                }
            });

            runner.test('Links normales NO tienen clase .circular', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const allLinks = el.shadowRoot.querySelectorAll('.graph-link');
                const normalLinks = el.shadowRoot.querySelectorAll('.graph-link:not(.circular)');

                runner.assertTrue(
                    normalLinks.length > 0,
                    'Debería haber links normales (no circulares)'
                );
                runner.assertTrue(
                    normalLinks.length < allLinks.length,
                    'Debería haber menos links normales que el total (algunos son circulares)'
                );
            });

        });

        // ====================================================================
        // F) GRANULARITY TOGGLE
        // ====================================================================

        runner.group('F) Toggle granularidad package/file', () => {

            runner.test('Botón de toggle de granularidad existe', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const toggleBtn = el.shadowRoot.querySelector('.granularity-toggle');
                runner.assertTrue(toggleBtn !== null, 'Debería existir un botón de toggle de granularidad');
            });

            runner.test('Granularidad por defecto es "file"', async (stage) => {
                const el = createGraph();
                runner.assertEqual(el._granularity, 'file', 'Granularidad inicial debería ser "file"');
            });

            runner.test('Click en toggle cambia granularidad a "package"', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const toggleBtn = el.shadowRoot.querySelector('.granularity-toggle');
                runner.assertTrue(toggleBtn !== null, 'Toggle debería existir');

                toggleBtn.click();
                await el.updateComplete;

                runner.assertEqual(
                    el._granularity, 'package',
                    'Tras click debería cambiar a "package"'
                );
            });

            runner.test('Modo package agrupa nodos por directorio', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                // Switch to package mode
                el._granularity = 'package';
                await el.updateComplete;
                await new Promise(r => requestAnimationFrame(() => setTimeout(r, 150)));

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');
                // 6 files in 2 dirs (src, tests) → should be 2 package nodes
                runner.assertTrue(
                    nodeGroups.length < MOCK_NODES.length,
                    `Modo package debería tener menos nodos que file (${nodeGroups.length} < ${MOCK_NODES.length})`
                );
            });

        });

        // ====================================================================
        // G) CLICK → HIGHLIGHT CONNECTIONS
        // ====================================================================

        runner.group('G) Click en nodo para highlight', () => {

            runner.test('Click en nodo actualiza _selectedNode', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                runner.assertTrue(
                    el._selectedNode === null || el._selectedNode === undefined,
                    'Inicialmente no debería haber nodo seleccionado'
                );

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');
                runner.assertTrue(nodeGroups.length > 0, 'Debería haber nodos');

                nodeGroups[0].dispatchEvent(new MouseEvent('click', { bubbles: true, composed: true }));
                await el.updateComplete;
                await new Promise(r => setTimeout(r, 50));

                runner.assertTrue(
                    el._selectedNode !== null && el._selectedNode !== undefined,
                    '_selectedNode debería haberse actualizado tras click'
                );
            });

            runner.test('Segundo click en mismo nodo deselecciona', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');
                const node = nodeGroups[0];

                // First click selects
                node.dispatchEvent(new MouseEvent('click', { bubbles: true, composed: true }));
                await el.updateComplete;
                const selectedId = el._selectedNode;

                // Second click deselects
                node.dispatchEvent(new MouseEvent('click', { bubbles: true, composed: true }));
                await el.updateComplete;
                await new Promise(r => setTimeout(r, 50));

                runner.assertTrue(
                    el._selectedNode === null,
                    'Segundo click debería deseleccionar el nodo'
                );
            });

        });

        // ====================================================================
        // H) TOOLTIP
        // ====================================================================

        runner.group('H) Tooltip en hover', () => {

            runner.test('Hover sobre nodo muestra tooltip', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                // Initially no tooltip
                runner.assertTrue(
                    el._tooltipData === null || el._tooltipData === undefined,
                    'Tooltip no debería ser visible inicialmente'
                );

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');
                runner.assertTrue(nodeGroups.length > 0, 'Debería haber nodos');

                nodeGroups[0].dispatchEvent(new MouseEvent('mouseenter', { bubbles: true }));
                await el.updateComplete;
                await new Promise(r => setTimeout(r, 50));

                runner.assertTrue(
                    el._tooltipData !== null,
                    'Tooltip data debería existir tras hover'
                );
            });

            runner.test('Tooltip contiene nombre del nodo', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');
                nodeGroups[0].dispatchEvent(new MouseEvent('mouseenter', { bubbles: true }));
                await el.updateComplete;
                await new Promise(r => setTimeout(r, 100));

                const tooltip = el.shadowRoot.querySelector('.graph-tooltip');
                runner.assertTrue(tooltip !== null, 'Tooltip element debería existir');

                const text = tooltip?.textContent || '';
                runner.assertTrue(text.length > 0, 'Tooltip debería tener contenido');
            });

            runner.test('Mouseleave oculta el tooltip', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');

                // Hover in
                nodeGroups[0].dispatchEvent(new MouseEvent('mouseenter', { bubbles: true }));
                await el.updateComplete;

                // Hover out
                nodeGroups[0].dispatchEvent(new MouseEvent('mouseleave', { bubbles: true }));
                await el.updateComplete;
                await new Promise(r => setTimeout(r, 50));

                runner.assertTrue(
                    el._tooltipData === null,
                    '_tooltipData debería ser null tras mouseleave'
                );
            });

        });

        // ====================================================================
        // I) EMPTY STATES
        // ====================================================================

        runner.group('I) Estados vacíos', () => {

            runner.test('Sin nodos muestra estado vacío', async (stage) => {
                const el = createGraph([], [], []);
                stage.appendChild(el);
                await waitForRender(el);

                const empty = el.shadowRoot.querySelector('.empty-state');
                runner.assertTrue(
                    empty !== null,
                    'Debería mostrar estado vacío cuando no hay nodos'
                );
            });

            runner.test('Con nodos pero sin dependencias muestra nodos sin links', async (stage) => {
                const el = createGraph(MOCK_NODES, [], []);
                stage.appendChild(el);
                await waitForRender(el);

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');
                const links = el.shadowRoot.querySelectorAll('.graph-link');

                runner.assertTrue(
                    nodeGroups.length > 0,
                    'Debería mostrar nodos aunque no haya dependencias'
                );
                runner.assertEqual(
                    links.length, 0,
                    'No debería haber links si no hay dependencias'
                );
            });

        });

        // ====================================================================
        // J) LEGEND
        // ====================================================================

        runner.group('J) Leyenda', () => {

            runner.test('Leyenda de colores MI visible', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const legend = el.shadowRoot.querySelector('.graph-legend');
                runner.assertTrue(
                    legend !== null,
                    'Debería existir una leyenda de colores MI'
                );
            });

            runner.test('Leyenda contiene indicadores de colores', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const legend = el.shadowRoot.querySelector('.graph-legend');
                runner.assertTrue(legend !== null, 'Leyenda debería existir');

                const text = legend?.textContent || '';
                // Should reference MI quality levels
                runner.assertTrue(
                    text.length > 5,
                    `Leyenda debería tener contenido descriptivo, got: "${text}"`
                );
            });

        });

        // ====================================================================
        // K) DATA ATTRIBUTES
        // ====================================================================

        runner.group('K) Data attributes', () => {

            runner.test('Nodos tienen data-id con el id del archivo', async (stage) => {
                const el = createGraph();
                stage.appendChild(el);
                await waitForRender(el);

                const nodeGroups = el.shadowRoot.querySelectorAll('.graph-node');
                runner.assertTrue(nodeGroups.length > 0, 'Debería haber nodos');

                const ids = Array.from(nodeGroups).map(g => g.dataset.id);
                runner.assertTrue(
                    ids.includes('src/app.py') || ids.includes('src/utils.py'),
                    `Nodos deberían tener data-id, got: ${JSON.stringify(ids)}`
                );
            });

        });

        // ====================================================================
        // RUN
        // ====================================================================

        runner.serverStatusContainer.innerHTML = '✅ Tests con datos mock (no requiere servidor)';
        runner.serverStatusContainer.className = 'mb-6 p-4 bg-green-100 border border-green-300 rounded-lg';

        await runner.run();
    </script>
</body>
</html>
