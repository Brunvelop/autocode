<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming API - Integration Tests</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-100 min-h-screen">
    <div class="flex items-center gap-4 mb-2">
        <a href="/tests" class="text-indigo-600 hover:text-indigo-800">← Tests</a>
        <h1 class="text-3xl font-bold">🌊 Streaming API - Integration Tests</h1>
    </div>
    <p class="text-gray-600 mb-4">Tests de callStreamAPI() y parsing SSE en AutoFunctionController.</p>
    
    <div id="summary" class="mb-6 p-4 bg-white rounded-lg shadow"></div>
    <div id="results" class="space-y-2"></div>

    <script type="module">
        import { TestRunner } from '../utils/test-runner.js';
        import { AutoFunctionController } from '/elements/auto-element-generator.js';

        const runner = new TestRunner();

        // ========================================
        // HELPER: Create mock SSE ReadableStream
        // ========================================
        function createSSEStream(events) {
            const encoder = new TextEncoder();
            let eventIndex = 0;

            return new ReadableStream({
                pull(controller) {
                    if (eventIndex < events.length) {
                        const { event, data } = events[eventIndex];
                        const dataStr = typeof data === 'string' ? data : JSON.stringify(data);
                        const chunk = `event: ${event}\ndata: ${dataStr}\n\n`;
                        controller.enqueue(encoder.encode(chunk));
                        eventIndex++;
                    } else {
                        controller.close();
                    }
                }
            });
        }

        // Backup original fetch
        const originalFetch = window.fetch;

        function mockFetch(stream, status = 200) {
            window.fetch = async (url, options) => ({
                ok: status >= 200 && status < 300,
                status: status,
                statusText: status === 200 ? 'OK' : 'Error',
                body: stream,
                json: async () => {
                    if (status >= 400) return { detail: `HTTP ${status} error` };
                    return {};
                }
            });
        }

        function restoreFetch() {
            window.fetch = originalFetch;
        }

        // ========================================
        // _processParams TESTS
        // ========================================
        runner.group('_processParams', () => {

            runner.test('_processParams parses JSON string for complex types', async () => {
                const ctrl = new AutoFunctionController();
                ctrl.funcInfo = {
                    parameters: [
                        { name: 'data', type: 'dict', required: true }
                    ]
                };

                const result = ctrl._processParams({ data: '{"key": "value"}' });
                runner.assertTrue(typeof result.data === 'object', 'Must parse JSON string to object');
                runner.assertEqual(result.data.key, 'value', 'Must preserve parsed values');
            });

            runner.test('_processParams converts int type', async () => {
                const ctrl = new AutoFunctionController();
                ctrl.funcInfo = {
                    parameters: [
                        { name: 'count', type: 'int', required: true }
                    ]
                };

                const result = ctrl._processParams({ count: '42' });
                runner.assertEqual(result.count, 42, 'Must convert string to int');
            });

            runner.test('_processParams converts float type', async () => {
                const ctrl = new AutoFunctionController();
                ctrl.funcInfo = {
                    parameters: [
                        { name: 'temp', type: 'float', required: true }
                    ]
                };

                const result = ctrl._processParams({ temp: '0.7' });
                runner.assertEqual(result.temp, 0.7, 'Must convert string to float');
            });

            runner.test('_processParams passes through unknown types', async () => {
                const ctrl = new AutoFunctionController();
                ctrl.funcInfo = {
                    parameters: [
                        { name: 'msg', type: 'str', required: true }
                    ]
                };

                const result = ctrl._processParams({ msg: 'hello' });
                runner.assertEqual(result.msg, 'hello', 'Must pass through string values');
            });

            runner.test('_processParams uses funcInfoOverride', async () => {
                const ctrl = new AutoFunctionController();
                ctrl.funcInfo = {
                    parameters: [
                        { name: 'x', type: 'str', required: true }
                    ]
                };

                const override = {
                    parameters: [
                        { name: 'x', type: 'int', required: true }
                    ]
                };

                const result = ctrl._processParams({ x: '10' }, override);
                runner.assertEqual(result.x, 10, 'Must use override funcInfo for type conversion');
            });

            runner.test('_processParams handles invalid JSON gracefully', async () => {
                const ctrl = new AutoFunctionController();
                ctrl.funcInfo = {
                    parameters: [
                        { name: 'data', type: 'dict', required: true }
                    ]
                };

                const result = ctrl._processParams({ data: 'not-json' });
                runner.assertEqual(result.data, 'not-json', 'Must fallback to original string on invalid JSON');
            });

            runner.test('_processParams works without funcInfo', async () => {
                const ctrl = new AutoFunctionController();
                // No funcInfo set

                const result = ctrl._processParams({ msg: 'hello', count: '5' });
                runner.assertEqual(result.msg, 'hello', 'Must pass through without funcInfo');
                runner.assertEqual(result.count, '5', 'Must not convert without param def');
            });
        });

        // ========================================
        // callStreamAPI SSE PARSING TESTS
        // ========================================
        runner.group('callStreamAPI SSE Parsing', () => {

            runner.test('callStreamAPI parses token events', async () => {
                const events = [
                    { event: 'token', data: { chunk: 'Hello', field: 'response' } },
                    { event: 'token', data: { chunk: ' world', field: 'response' } },
                    { event: 'complete', data: { success: true, result: { response: 'Hello world' } } }
                ];

                mockFetch(createSSEStream(events));

                try {
                    const ctrl = new AutoFunctionController();
                    const collected = [];

                    for await (const evt of ctrl.callStreamAPI('chat_stream', {})) {
                        collected.push(evt);
                    }

                    runner.assertEqual(collected.length, 3, 'Must receive 3 events');
                    runner.assertEqual(collected[0].event, 'token', 'First event must be token');
                    runner.assertEqual(collected[0].data.chunk, 'Hello', 'First chunk must be Hello');
                    runner.assertEqual(collected[1].data.chunk, ' world', 'Second chunk must be world');
                    runner.assertEqual(collected[2].event, 'complete', 'Last event must be complete');
                    runner.assertTrue(collected[2].data.success, 'Complete must have success');
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI parses status events', async () => {
                const events = [
                    { event: 'status', data: { message: '🧠 Thinking...' } },
                    { event: 'token', data: { chunk: 'Answer', field: 'response' } },
                    { event: 'complete', data: { success: true } }
                ];

                mockFetch(createSSEStream(events));

                try {
                    const ctrl = new AutoFunctionController();
                    const collected = [];

                    for await (const evt of ctrl.callStreamAPI('test', {})) {
                        collected.push(evt);
                    }

                    runner.assertEqual(collected[0].event, 'status', 'First must be status');
                    runner.assertEqual(collected[0].data.message, '🧠 Thinking...', 'Status message must match');
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI parses error events', async () => {
                const events = [
                    { event: 'error', data: { message: 'Something went wrong', success: false } }
                ];

                mockFetch(createSSEStream(events));

                try {
                    const ctrl = new AutoFunctionController();
                    const collected = [];

                    for await (const evt of ctrl.callStreamAPI('test', {})) {
                        collected.push(evt);
                    }

                    runner.assertEqual(collected.length, 1, 'Must receive 1 event');
                    runner.assertEqual(collected[0].event, 'error', 'Event must be error');
                    runner.assertEqual(collected[0].data.message, 'Something went wrong');
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI handles unicode in data', async () => {
                const events = [
                    { event: 'token', data: { chunk: '¡Hola! 🌍 中文', field: 'response' } },
                    { event: 'complete', data: { success: true } }
                ];

                mockFetch(createSSEStream(events));

                try {
                    const ctrl = new AutoFunctionController();
                    const collected = [];

                    for await (const evt of ctrl.callStreamAPI('test', {})) {
                        collected.push(evt);
                    }

                    runner.assertEqual(collected[0].data.chunk, '¡Hola! 🌍 中文', 'Must handle unicode');
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI handles chunked SSE delivery', async () => {
                // Simulate SSE data arriving in arbitrary chunks (not aligned to event boundaries)
                const encoder = new TextEncoder();
                const fullSSE = 'event: token\ndata: {"chunk":"Hello"}\n\nevent: complete\ndata: {"success":true}\n\n';
                const bytes = encoder.encode(fullSSE);

                // Split in the middle of an event
                const mid = Math.floor(bytes.length / 2);
                const chunk1 = bytes.slice(0, mid);
                const chunk2 = bytes.slice(mid);

                let readCount = 0;
                const stream = new ReadableStream({
                    pull(controller) {
                        if (readCount === 0) {
                            controller.enqueue(chunk1);
                            readCount++;
                        } else if (readCount === 1) {
                            controller.enqueue(chunk2);
                            readCount++;
                        } else {
                            controller.close();
                        }
                    }
                });

                mockFetch(stream);

                try {
                    const ctrl = new AutoFunctionController();
                    const collected = [];

                    for await (const evt of ctrl.callStreamAPI('test', {})) {
                        collected.push(evt);
                    }

                    runner.assertEqual(collected.length, 2, 'Must reconstruct 2 events from chunks');
                    runner.assertEqual(collected[0].event, 'token');
                    runner.assertEqual(collected[0].data.chunk, 'Hello');
                    runner.assertEqual(collected[1].event, 'complete');
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI handles last event without trailing newline', async () => {
                // Stream ends without final \n\n — the pending event should still be yielded
                const encoder = new TextEncoder();
                const sseData = 'event: complete\ndata: {"success":true}';  // No trailing \n\n
                
                const stream = new ReadableStream({
                    start(controller) {
                        controller.enqueue(encoder.encode(sseData));
                        controller.close();
                    }
                });

                mockFetch(stream);

                try {
                    const ctrl = new AutoFunctionController();
                    const collected = [];

                    for await (const evt of ctrl.callStreamAPI('test', {})) {
                        collected.push(evt);
                    }

                    runner.assertEqual(collected.length, 1, 'Must yield pending event');
                    runner.assertEqual(collected[0].event, 'complete');
                    runner.assertTrue(collected[0].data.success);
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI handles non-JSON data gracefully', async () => {
                const encoder = new TextEncoder();
                const sseData = 'event: status\ndata: plain text message\n\n';

                const stream = new ReadableStream({
                    start(controller) {
                        controller.enqueue(encoder.encode(sseData));
                        controller.close();
                    }
                });

                mockFetch(stream);

                try {
                    const ctrl = new AutoFunctionController();
                    const collected = [];

                    for await (const evt of ctrl.callStreamAPI('test', {})) {
                        collected.push(evt);
                    }

                    runner.assertEqual(collected.length, 1, 'Must yield event with raw data');
                    runner.assertEqual(collected[0].event, 'status');
                    runner.assertEqual(collected[0].data, 'plain text message', 'Must return raw string');
                } finally {
                    restoreFetch();
                }
            });
        });

        // ========================================
        // callStreamAPI ERROR HANDLING
        // ========================================
        runner.group('callStreamAPI Error Handling', () => {

            runner.test('callStreamAPI throws on HTTP error', async () => {
                mockFetch(null, 500);

                try {
                    const ctrl = new AutoFunctionController();
                    let threw = false;

                    try {
                        for await (const evt of ctrl.callStreamAPI('test', {})) {
                            // should not reach here
                        }
                    } catch (e) {
                        threw = true;
                        runner.assertTrue(e.message.includes('500'), 'Error must mention status code');
                    }

                    runner.assertTrue(threw, 'Must throw on HTTP error');
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI throws on HTTP 404', async () => {
                window.fetch = async () => ({
                    ok: false,
                    status: 404,
                    statusText: 'Not Found',
                    json: async () => { throw new Error('no json'); }
                });

                try {
                    const ctrl = new AutoFunctionController();
                    let threw = false;

                    try {
                        for await (const evt of ctrl.callStreamAPI('nonexistent', {})) {}
                    } catch (e) {
                        threw = true;
                        runner.assertTrue(
                            e.message.includes('404') || e.message.includes('Not Found'),
                            'Error must mention 404'
                        );
                    }

                    runner.assertTrue(threw, 'Must throw on 404');
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI sends POST with JSON body', async () => {
                let capturedOptions = null;
                let capturedUrl = null;

                window.fetch = async (url, options) => {
                    capturedUrl = url;
                    capturedOptions = options;
                    return {
                        ok: true,
                        status: 200,
                        body: createSSEStream([
                            { event: 'complete', data: { success: true } }
                        ])
                    };
                };

                try {
                    const ctrl = new AutoFunctionController();
                    
                    for await (const evt of ctrl.callStreamAPI('chat_stream', { message: 'hi', temperature: 0.5 })) {}

                    runner.assertEqual(capturedUrl, '/chat_stream', 'URL must be /{endpoint}');
                    runner.assertEqual(capturedOptions.method, 'POST', 'Method must be POST');
                    runner.assertEqual(capturedOptions.headers['Content-Type'], 'application/json');

                    const body = JSON.parse(capturedOptions.body);
                    runner.assertEqual(body.message, 'hi');
                    runner.assertEqual(body.temperature, 0.5);
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI processes params with funcInfo', async () => {
                let capturedBody = null;

                window.fetch = async (url, options) => {
                    capturedBody = JSON.parse(options.body);
                    return {
                        ok: true,
                        status: 200,
                        body: createSSEStream([
                            { event: 'complete', data: { success: true } }
                        ])
                    };
                };

                try {
                    const ctrl = new AutoFunctionController();
                    const funcInfo = {
                        parameters: [
                            { name: 'max_tokens', type: 'int', required: false },
                            { name: 'temperature', type: 'float', required: false }
                        ]
                    };

                    for await (const evt of ctrl.callStreamAPI('chat_stream', { max_tokens: '16000', temperature: '0.7' }, funcInfo)) {}

                    runner.assertEqual(capturedBody.max_tokens, 16000, 'Must convert int param');
                    runner.assertEqual(capturedBody.temperature, 0.7, 'Must convert float param');
                } finally {
                    restoreFetch();
                }
            });
        });

        // ========================================
        // EMPTY / EDGE CASES
        // ========================================
        runner.group('Edge Cases', () => {

            runner.test('callStreamAPI handles empty stream', async () => {
                const stream = new ReadableStream({
                    start(controller) {
                        controller.close();
                    }
                });

                mockFetch(stream);

                try {
                    const ctrl = new AutoFunctionController();
                    const collected = [];

                    for await (const evt of ctrl.callStreamAPI('test', {})) {
                        collected.push(evt);
                    }

                    runner.assertEqual(collected.length, 0, 'Must yield nothing for empty stream');
                } finally {
                    restoreFetch();
                }
            });

            runner.test('callStreamAPI handles many rapid events', async () => {
                const events = [];
                for (let i = 0; i < 100; i++) {
                    events.push({ event: 'token', data: { chunk: `t${i}`, field: 'response' } });
                }
                events.push({ event: 'complete', data: { success: true } });

                mockFetch(createSSEStream(events));

                try {
                    const ctrl = new AutoFunctionController();
                    const collected = [];

                    for await (const evt of ctrl.callStreamAPI('test', {})) {
                        collected.push(evt);
                    }

                    runner.assertEqual(collected.length, 101, 'Must receive all 101 events');
                    runner.assertEqual(collected[0].data.chunk, 't0', 'First token correct');
                    runner.assertEqual(collected[99].data.chunk, 't99', 'Last token correct');
                    runner.assertEqual(collected[100].event, 'complete', 'Final event is complete');
                } finally {
                    restoreFetch();
                }
            });
        });

        runner.run();
    </script>
</body>
</html>
