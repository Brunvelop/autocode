<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocode - Code Garden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f9fafb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        nav {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e5e7eb;
            z-index: 50;
            flex: none;
        }
        .nav-container {
            max-width: 100%;
            padding: 0 1rem;
        }
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 3.5rem;
        }
        .nav-left {
            display: flex;
            align-items: center;
        }
        .logo {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .logo-icon {
            font-size: 1.5rem;
        }
        .logo-text {
            font-weight: bold;
            font-size: 1.25rem;
            color: #1f2937;
            letter-spacing: -0.025em;
        }
        /* ===== NAV TABS (center) ===== */
        .nav-center {
            display: flex;
            align-items: center;
        }
        .nav-tabs {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .nav-tab {
            padding: 0.3rem 1.1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #6b7280;
            transition: all 0.15s;
            line-height: 1;
        }
        .nav-tab:hover {
            background: #f3f4f6;
            color: #1f2937;
        }
        .nav-tab.active {
            background: #eef2ff;
            color: #4f46e5;
            font-weight: 600;
        }
        /* ===== NAV RIGHT ===== */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .nav-link {
            color: #4b5563;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.875rem;
            text-decoration: none;
        }
        .nav-link:hover {
            color: #4f46e5;
        }
        /* ===== MAIN & PANELS ===== */
        main {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .app-panel {
            width: 100%;
            height: 100%;
            display: none;
        }
        .app-panel.active {
            display: block;
        }
    </style>
    
    <!-- Libraries -->

    <!-- Custom Elements -->
    <script type="module" src="/elements/chat/index.js"></script>
    <script type="module" src="/refract/generator.js"></script>
    <script type="module" src="/elements/git-dashboard/index.js"></script>
    <script type="module" src="/elements/code-dashboard/index.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="nav-container">
            <div class="nav-content">
                <div class="nav-left">
                    <a href="/" class="logo">
                        <span class="logo-icon">🌳</span>
                        <span class="logo-text">Autocode</span>
                    </a>
                </div>
                <div class="nav-center">
                    <div class="nav-tabs">
                        <button class="nav-tab active" data-tab="git">🌳 Git</button>
                        <button class="nav-tab" data-tab="code">📊 Code</button>
                    </div>
                </div>
                <div class="nav-right">
                    <a href="/functions" class="nav-link">
                        <span>🚀</span> Functions
                    </a>
                    <a href="/tests" class="nav-link">
                        <span>🧪</span> Tests
                    </a>
                    <a href="/health" class="nav-link">
                        <span>💚</span> Health
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content: Tab panels -->
    <main>
        <div class="app-panel active" id="panel-git">
            <git-dashboard></git-dashboard>
        </div>
        <div class="app-panel" id="panel-code">
            <code-dashboard></code-dashboard>
        </div>
    </main>

    <!-- Chat Element (Global) -->
    <autocode-chat></autocode-chat>

    <script>
        document.querySelectorAll('.nav-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.app-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
            });
        });
    </script>
</body>
</html>
